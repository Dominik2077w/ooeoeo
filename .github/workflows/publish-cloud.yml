# 构建推送 Docker 镜像到 GHCR，然后自动部署到生产服务器
# 源码从 Myjoy 私有仓库 checkout，不泄漏
#
# 支持选择性构建：只改了 website 时可以只构建 website
# 部署适配 scaling 双 compose 架构（gateway + node）
name: Publish & Deploy Cloud

on:
  workflow_dispatch:
    inputs:
      tag_override:
        description: "镜像 tag（留空则用 dev-日期-sha）"
        required: false
      deploy:
        description: "构建后自动部署到生产？"
        required: false
        default: "false"
        type: boolean
      components:
        description: "构建哪些组件（逗号分隔：cloud_v1,website,web-console 或 all）"
        required: false
        default: "all"
      ref:
        description: "Myjoy Git ref"
        required: false
        default: "main"
  repository_dispatch:
    types: [publish-cloud]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: dominik2077w/ooeoeo-cloud
  MYJOY_REPO: Dominik2077w/Myjoy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  # ── 确定要构建哪些组件 + 解析部署 topology ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      gateway_matrix: ${{ steps.topology.outputs.gateway_matrix }}
      node_matrix: ${{ steps.topology.outputs.node_matrix }}
      should_deploy_gateway: ${{ steps.deploy_targets.outputs.should_deploy_gateway }}
      should_deploy_node: ${{ steps.deploy_targets.outputs.should_deploy_node }}
      # 本次构建的 gateway/node 组件子集 (空格分隔)。
      # deploy 步骤只会 pull/up 这些组件,避免触碰未被构建的服务 tag。
      built_gateway_components: ${{ steps.deploy_targets.outputs.built_gateway_components }}
      built_node_components: ${{ steps.deploy_targets.outputs.built_node_components }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag_override || github.event.client_payload.tag || '' }}"
          if [ -z "$TAG" ]; then
            TAG="dev-$(date +%Y%m%d)-${GITHUB_SHA::8}"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        run: |
          COMPONENTS="${{ github.event.inputs.components || github.event.client_payload.components || 'all' }}"

          # 用 jq -c 压缩成单行 — GITHUB_OUTPUT 不接受多行 value (除非用 heredoc 分隔符)
          ALL=$(jq -nc '[
            {image:"cloud_v1",  context:".",                            dockerfile:"ooeoeo/cloud_v1/Dockerfile"},
            {image:"website",   context:"ooeoeo/website",               dockerfile:"ooeoeo/website/Dockerfile"},
            {image:"web-console", context:"ooeoeo/cloud_v1/web-console", dockerfile:"ooeoeo/cloud_v1/web-console/Dockerfile"}
          ]')

          if [ "$COMPONENTS" = "all" ]; then
            FILTERED="$ALL"
          else
            FILTERED=$(echo "$ALL" | jq -c --arg comp "$COMPONENTS" \
              '[.[] | select(.image as $img | ($comp | split(",") | map(gsub("\\s";"")) | any(. == $img)))]')
          fi
          MATRIX=$(jq -nc --argjson inc "$FILTERED" '{include:$inc}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      # 根据本次 build 的 components 决定要 deploy 哪一组服务器,并列出每组
      # 实际要部署的服务子集。没被 build 的 image 在 GHCR 没有新 tag,
      # deploy 步骤只会对被 build 的子集执行 pull/up。
      #
      # gateway 上跑 website + web-console,node 上跑 cloud_v1。
      - name: Determine deploy targets
        id: deploy_targets
        run: |
          COMPONENTS="${{ github.event.inputs.components || github.event.client_payload.components || 'all' }}"

          # 展开 all → 全集
          if [ "$COMPONENTS" = "all" ]; then
            EXPANDED="cloud_v1,website,web-console"
          else
            EXPANDED="$COMPONENTS"
          fi

          # 规范化成空格分隔 (去掉空格)
          EXPANDED_NORM=$(echo "$EXPANDED" | tr ',' ' ' | tr -s ' ')

          GATEWAY_BUILT=""
          NODE_BUILT=""
          for c in $EXPANDED_NORM; do
            case "$c" in
              website|web-console) GATEWAY_BUILT="$GATEWAY_BUILT $c" ;;
              cloud_v1)            NODE_BUILT="$NODE_BUILT $c" ;;
            esac
          done
          GATEWAY_BUILT=$(echo "$GATEWAY_BUILT" | xargs || true)
          NODE_BUILT=$(echo "$NODE_BUILT" | xargs || true)

          if [ -n "$GATEWAY_BUILT" ]; then
            echo "should_deploy_gateway=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_gateway=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$NODE_BUILT" ]; then
            echo "should_deploy_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_node=false" >> "$GITHUB_OUTPUT"
          fi
          echo "built_gateway_components=$GATEWAY_BUILT" >> "$GITHUB_OUTPUT"
          echo "built_node_components=$NODE_BUILT" >> "$GITHUB_OUTPUT"

          echo "components=$COMPONENTS"
          echo "gateway_built=$GATEWAY_BUILT"
          echo "node_built=$NODE_BUILT"

      # ── 解析部署 topology（来自 GitHub vars）──
      # vars.DEPLOY_GATEWAYS 和 vars.DEPLOY_NODES 用同一格式:
      #   "name=host,name=host,..."
      # 例:
      #   DEPLOY_GATEWAYS = "eu=138.199.205.71,us=1.2.3.4"
      #   DEPLOY_NODES    = "eu-n1=178.104.129.69,eu-n2=178.104.129.70,us-n1=5.6.7.8"
      # 加新节点 = 改 var 加一个条目, 不需改 workflow。
      - name: Parse deploy topology
        id: topology
        env:
          GATEWAYS_RAW: ${{ vars.DEPLOY_GATEWAYS }}
          NODES_RAW: ${{ vars.DEPLOY_NODES }}
        run: |
          parse_hosts() {
            local raw="$1"
            if [ -z "$raw" ]; then
              echo '{"include":[]}'
              return
            fi
            echo "$raw" | jq -Rsc '
              gsub("\\s"; "") | split(",") |
              map(select(length > 0)) |
              map(capture("^(?<name>[^=]+)=(?<host>.+)$")) |
              {include: .}
            '
          }
          GATEWAY_MATRIX=$(parse_hosts "$GATEWAYS_RAW")
          NODE_MATRIX=$(parse_hosts "$NODES_RAW")
          echo "gateway_matrix=$GATEWAY_MATRIX" >> "$GITHUB_OUTPUT"
          echo "node_matrix=$NODE_MATRIX" >> "$GITHUB_OUTPUT"
          echo "Parsed gateways: $GATEWAY_MATRIX"
          echo "Parsed nodes:    $NODE_MATRIX"

      # 如果 deploy=true 但没配任何 host, 提前 fail 提醒用户配 vars
      - name: Validate topology when deploy enabled
        if: github.event.inputs.deploy == 'true' || github.event.client_payload.deploy == true
        env:
          GW: ${{ steps.topology.outputs.gateway_matrix }}
          ND: ${{ steps.topology.outputs.node_matrix }}
        run: |
          GW_COUNT=$(echo "$GW" | jq '.include | length')
          ND_COUNT=$(echo "$ND" | jq '.include | length')
          if [ "$GW_COUNT" -eq 0 ] && [ "$ND_COUNT" -eq 0 ]; then
            echo "ERROR: deploy=true 但 vars.DEPLOY_GATEWAYS 和 vars.DEPLOY_NODES 都为空。"
            echo "请在 repo Settings → Secrets and variables → Actions → Variables 配置:"
            echo "  DEPLOY_GATEWAYS = 'eu=<gateway-ip>'"
            echo "  DEPLOY_NODES    = 'eu-n1=<node-ip>'"
            exit 1
          fi
          echo "Will deploy to $GW_COUNT gateway(s) and $ND_COUNT node(s)"

  # ── 构建并推送镜像 ──
  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}

      # 用 MYJOY_PAT (用户域 PAT, 需 write:packages + read:packages scope)
      # 而非 GITHUB_TOKEN。MYJOY_PAT 的 owner 是用户,对名下所有 ghcr
      # package 都有访问权,不受 repo 链接权限影响 —— 更鲁棒。
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MYJOY_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          build-args: |
            OOOEOEO_BUILD_VERSION=${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ── 部署到生产服务器（scaling 多机架构,vars + matrix 动态展开）──
  #
  # 多机架构:
  #   - Gateway 服务器: website + web-console + 基础设施
  #     部署目录 /opt/ooeoeo/deploy/scaling/, compose 文件 docker-compose.gateway.yml
  #   - Node 服务器: cloud_v1
  #     部署目录 /opt/ooeoeo/deploy/scaling/, compose 文件 docker-compose.node.yml
  #
  # 通过 GitHub repo vars 动态声明所有目标 (加节点 = 改一行 var, 不改 workflow):
  #
  #   vars.DEPLOY_GATEWAYS = "eu=138.199.205.71"
  #   vars.DEPLOY_NODES    = "eu-n1=178.104.129.69"
  #
  # 未来扩展示例:
  #   vars.DEPLOY_GATEWAYS = "eu=138.199.205.71,us=1.2.3.4,ap=5.6.7.8"
  #   vars.DEPLOY_NODES    = "eu-n1=178.104.129.69,eu-n2=178.104.129.70,us-n1=9.10.11.12"
  #
  # 必需 secrets (所有机器共用 SSH 凭据):
  #   - DEPLOY_SSH_USER  全集群共用 SSH 用户 (例: root)
  #   - DEPLOY_SSH_KEY   全集群共用 SSH 私钥
  #
  # 部署顺序: 所有 gateway 并行 → 所有 node 并行(node 等所有 gateway 完成)。
  # 任一目标失败只回滚自己那一台 (fail-fast: false)。
  deploy-gateway:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    if: |
      (github.event.inputs.deploy == 'true' || github.event.client_payload.deploy == true)
      && needs.prepare.outputs.should_deploy_gateway == 'true'
      && needs.prepare.outputs.gateway_matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.gateway_matrix) }}
    steps:
      - name: Deploy gateway ${{ matrix.name }}
        uses: appleboy/ssh-action@v1
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
          NAME: ${{ matrix.name }}
          BUILT: ${{ needs.prepare.outputs.built_gateway_components }}
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION,NAME,BUILT
          script: |
            set -euo pipefail
            cd /opt/ooeoeo/deploy/scaling

            echo "=== [GATEWAY $NAME] Deploying $VERSION (components: $BUILT) ==="

            # service name → .env 变量名: website → OOOEOEO_WEBSITE_TAG
            to_var() {
              local svc="$1"
              local upper=$(echo "$svc" | tr 'a-z-' 'A-Z_')
              echo "OOOEOEO_${upper}_TAG"
            }

            # 幂等 upsert .env 里的 key=value
            upsert_env() {
              local key="$1" value="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }

            # 记录所有被改动组件的旧 tag,用于潜在回滚 (gateway 当前不做 healthcheck,
            # 但保留信息方便手动回退)。
            declare -A PREV_TAGS=()
            for svc in $BUILT; do
              var=$(to_var "$svc")
              prev=$(grep "^${var}=" .env 2>/dev/null | cut -d= -f2 || echo "latest")
              PREV_TAGS[$svc]="$prev"
              echo "  $svc: $prev → $VERSION"
              upsert_env "$var" "$VERSION"
            done

            echo "--- Pulling: $BUILT ---"
            docker compose -f docker-compose.gateway.yml pull $BUILT

            echo "--- Restarting: $BUILT ---"
            docker compose -f docker-compose.gateway.yml up -d --no-deps $BUILT

            echo "=== [GATEWAY $NAME] Deploy $VERSION succeeded ==="
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' | grep -E "$(echo $BUILT | tr ' ' '|')" || true

  deploy-node:
    needs: [prepare, build-and-push, deploy-gateway]
    runs-on: ubuntu-latest
    # 只在 cloud_v1 被构建时推 node;
    # 等 deploy-gateway 完成 (success 或 skipped 都可以),允许 components=cloud_v1 时跳过 gateway。
    #
    # !cancelled() 必须在 if 表达式开头:GitHub Actions 在 needs 含 skipped job 时
    # 默认会让本 job 也 skipped,除非 if 显式包含 status check function
    # (always() / !cancelled() / success() 等),否则 if 主体永远不会被求值。
    if: |
      !cancelled()
      && (github.event.inputs.deploy == 'true' || github.event.client_payload.deploy == true)
      && needs.prepare.outputs.should_deploy_node == 'true'
      && needs.prepare.outputs.node_matrix != '{"include":[]}'
      && needs.build-and-push.result == 'success'
      && (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped')
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.node_matrix) }}
    steps:
      - name: Deploy node ${{ matrix.name }}
        uses: appleboy/ssh-action@v1
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
          NAME: ${{ matrix.name }}
          BUILT: ${{ needs.prepare.outputs.built_node_components }}
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION,NAME,BUILT
          script: |
            set -euo pipefail
            cd /opt/ooeoeo/deploy/scaling

            echo "=== [NODE $NAME] Deploying $VERSION (components: $BUILT) ==="

            to_var() {
              local svc="$1"
              local upper=$(echo "$svc" | tr 'a-z-' 'A-Z_')
              echo "OOOEOEO_${upper}_TAG"
            }

            upsert_env() {
              local key="$1" value="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }

            declare -A PREV_TAGS=()
            for svc in $BUILT; do
              var=$(to_var "$svc")
              prev=$(grep "^${var}=" .env 2>/dev/null | cut -d= -f2 || echo "latest")
              PREV_TAGS[$svc]="$prev"
              echo "  $svc: $prev → $VERSION"
              upsert_env "$var" "$VERSION"
            done

            echo "--- Pulling: $BUILT ---"
            docker compose -f docker-compose.node.yml pull $BUILT

            echo "--- Restarting: $BUILT ---"
            docker compose -f docker-compose.node.yml up -d --no-deps $BUILT

            # cloud_v1 健康检查 (只在 cloud_v1 被重启时做)
            if echo " $BUILT " | grep -q " cloud_v1 "; then
              echo "=== [NODE $NAME] Health check cloud_v1 ==="
              OK=0
              for i in $(seq 1 12); do
                sleep 5
                if docker compose -f docker-compose.node.yml exec -T cloud_v1 wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1; then
                  OK=1
                  break
                fi
                echo "  Attempt $i/12 — waiting..."
              done

              if [ "$OK" -ne 1 ]; then
                prev_cloud="${PREV_TAGS[cloud_v1]}"
                echo "=== [NODE $NAME] HEALTH CHECK FAILED — ROLLING BACK cloud_v1 to $prev_cloud ==="
                upsert_env "$(to_var cloud_v1)" "$prev_cloud"
                docker compose -f docker-compose.node.yml pull cloud_v1
                docker compose -f docker-compose.node.yml up -d --no-deps cloud_v1
                echo "=== [NODE $NAME] Rollback complete ==="
                exit 1
              fi
            fi

            echo "=== [NODE $NAME] Deploy $VERSION succeeded ==="
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' | grep -E "$(echo $BUILT | tr ' ' '|')" || true
