# 构建推送 Docker 镜像到 GHCR，然后自动部署到生产服务器
# 源码从 Myjoy 私有仓库 checkout，不泄漏
#
# 支持选择性构建：只改了 website 时可以只构建 website
# 部署适配 scaling 双 compose 架构（gateway + node）
name: Publish & Deploy Cloud

on:
  workflow_dispatch:
    inputs:
      tag_override:
        description: "镜像 tag（留空则用 dev-日期-sha）"
        required: false
      deploy:
        description: "构建后自动部署到生产？"
        required: false
        default: "false"
        type: boolean
      components:
        description: "构建哪些组件（逗号分隔：cloud_v1,website,web-console 或 all）"
        required: false
        default: "all"
      ref:
        description: "Myjoy Git ref"
        required: false
        default: "main"
  repository_dispatch:
    types: [publish-cloud]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: dominik2077w/ooeoeo-cloud
  MYJOY_REPO: Dominik2077w/Myjoy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  # ── 确定要构建哪些组件 ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag_override || github.event.client_payload.tag || '' }}"
          if [ -z "$TAG" ]; then
            TAG="dev-$(date +%Y%m%d)-${GITHUB_SHA::8}"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        run: |
          COMPONENTS="${{ github.event.inputs.components || github.event.client_payload.components || 'all' }}"

          ALL='[
            {"image":"cloud_v1","context":".","dockerfile":"ooeoeo/cloud_v1/Dockerfile"},
            {"image":"website","context":"ooeoeo/website","dockerfile":"ooeoeo/website/Dockerfile"},
            {"image":"web-console","context":"ooeoeo/cloud_v1/web-console","dockerfile":"ooeoeo/cloud_v1/web-console/Dockerfile"}
          ]'

          if [ "$COMPONENTS" = "all" ]; then
            echo "matrix={\"include\":$ALL}" >> "$GITHUB_OUTPUT"
          else
            # 从 all 中过滤出选中的组件
            FILTERED=$(echo "$ALL" | jq -c --arg comp "$COMPONENTS" '
              [.[] | select(.image as $img | ($comp | split(",") | map(gsub("\\s";"")) | any(. == $img)))]
            ')
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  # ── 构建并推送镜像 ──
  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          build-args: |
            OOOEOEO_BUILD_VERSION=${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ── 部署到生产服务器（scaling 双机架构: gateway + node）──
  #
  # 双机架构:
  #   - Gateway 服务器 (DEPLOY_SSH_HOST): website + web-console + 基础设施
  #     部署目录 /opt/ooeoeo/deploy/scaling/, compose 文件 docker-compose.gateway.yml
  #   - Node 服务器 (DEPLOY_SSH_HOST_NODE): cloud_v1
  #     部署目录 /opt/ooeoeo/deploy/scaling/, compose 文件 docker-compose.node.yml
  #
  # 两台服务器各自有独立的 .env (gateway 上是 gateway 配置, node 上是 node 配置),
  # 但都用同名 OOOEOEO_IMAGE_TAG 变量。
  #
  # 部署顺序: 先 gateway → 后 node, 失败时只回滚出错那一台。
  #
  # 必需 secrets:
  #   - DEPLOY_SSH_HOST       gateway 服务器
  #   - DEPLOY_SSH_HOST_NODE  node 服务器
  #   - DEPLOY_SSH_USER       两台共用 SSH 用户
  #   - DEPLOY_SSH_KEY        两台共用 SSH key
  deploy-gateway:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy == 'true' || github.event.client_payload.deploy == true
    steps:
      - name: Deploy gateway via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION
          script: |
            set -euo pipefail
            cd /opt/ooeoeo/deploy/scaling

            VERSION="${{ needs.prepare.outputs.tag }}"
            echo "=== [GATEWAY] Deploying $VERSION ==="

            PREV_TAG=$(grep '^OOOEOEO_IMAGE_TAG=' .env | cut -d= -f2 || echo "latest")
            echo "PREV_TAG=$PREV_TAG"

            sed -i "s/^OOOEOEO_IMAGE_TAG=.*/OOOEOEO_IMAGE_TAG=$VERSION/" .env

            echo "--- Pulling gateway images ---"
            docker compose -f docker-compose.gateway.yml pull website web-console

            echo "--- Restarting gateway services ---"
            docker compose -f docker-compose.gateway.yml up -d --no-deps website web-console

            echo "=== [GATEWAY] Deploy $VERSION succeeded ==="
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' | grep -E 'website|web-console' || true

  deploy-node:
    needs: [prepare, build-and-push, deploy-gateway]
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy == 'true' || github.event.client_payload.deploy == true
    steps:
      - name: Deploy node via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST_NODE }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION
          script: |
            set -euo pipefail
            cd /opt/ooeoeo/deploy/scaling

            VERSION="${{ needs.prepare.outputs.tag }}"
            echo "=== [NODE] Deploying $VERSION ==="

            PREV_TAG=$(grep '^OOOEOEO_IMAGE_TAG=' .env | cut -d= -f2 || echo "latest")
            echo "PREV_TAG=$PREV_TAG"

            sed -i "s/^OOOEOEO_IMAGE_TAG=.*/OOOEOEO_IMAGE_TAG=$VERSION/" .env

            echo "--- Pulling node images ---"
            docker compose -f docker-compose.node.yml pull cloud_v1

            echo "--- Restarting cloud_v1 ---"
            docker compose -f docker-compose.node.yml up -d --no-deps cloud_v1

            echo "=== Health check ==="
            OK=0
            for i in $(seq 1 12); do
              sleep 5
              if docker compose -f docker-compose.node.yml exec -T cloud_v1 wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1; then
                OK=1
                break
              fi
              echo "  Attempt $i/12 — waiting..."
            done

            if [ "$OK" -ne 1 ]; then
              echo "=== [NODE] HEALTH CHECK FAILED — ROLLING BACK to $PREV_TAG ==="
              sed -i "s/^OOOEOEO_IMAGE_TAG=.*/OOOEOEO_IMAGE_TAG=$PREV_TAG/" .env
              docker compose -f docker-compose.node.yml pull cloud_v1
              docker compose -f docker-compose.node.yml up -d --no-deps cloud_v1
              echo "=== Node rollback complete ==="
              exit 1
            fi

            echo "=== [NODE] Deploy $VERSION succeeded ==="
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' | grep cloud_v1 || true
