# 构建推送 Docker 镜像到 GHCR，然后自动部署到生产服务器
# 源码从 Myjoy 私有仓库 checkout，不泄漏
name: Publish & Deploy Cloud

on:
  workflow_dispatch:
    inputs:
      tag_override:
        description: "镜像 tag（留空则用 dev-日期-sha）"
        required: false
      deploy:
        description: "构建后自动部署到生产？"
        required: false
        default: "false"
        type: boolean
      ref:
        description: "Myjoy Git ref"
        required: false
        default: "main"
  repository_dispatch:
    types: [publish-cloud]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: dominik2077w/ooeoeo-cloud
  MYJOY_REPO: Dominik2077w/Myjoy

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: cloud_v1
            context: .
            dockerfile: ooeoeo/cloud_v1/Dockerfile
          - image: website
            context: ooeoeo/website
            dockerfile: ooeoeo/website/Dockerfile
          - image: web-console
            context: ooeoeo/cloud_v1/web-console
            dockerfile: ooeoeo/cloud_v1/web-console/Dockerfile
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}

      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag_override || github.event.client_payload.tag }}" ]]; then
            echo "version=${{ github.event.inputs.tag_override || github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(date +%Y%m%d)-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          build-args: |
            OOOEOEO_BUILD_VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy == 'true' || github.event.client_payload.deploy == true
    steps:
      - name: Determine version
        id: tag
        run: |
          VERSION="${{ github.event.inputs.tag_override || github.event.client_payload.tag || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +%Y%m%d)-${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/ooeoeo

            VERSION="${{ steps.tag.outputs.version }}"
            echo "=== Deploying $VERSION ==="

            PREV_TAG=$(grep '^OOOEOEO_IMAGE_TAG=' .env | cut -d= -f2 || echo "latest")
            sed -i "s/^OOOEOEO_IMAGE_TAG=.*/OOOEOEO_IMAGE_TAG=$VERSION/" .env

            docker compose pull cloud_v1 website web_console
            docker compose up -d --no-deps cloud_v1 website web_console

            echo "=== Health check ==="
            OK=0
            for i in $(seq 1 12); do
              sleep 5
              if docker compose exec -T cloud_v1 wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1; then
                OK=1
                break
              fi
              echo "  Attempt $i/12 — waiting..."
            done

            if [ "$OK" -ne 1 ]; then
              echo "=== HEALTH CHECK FAILED — ROLLING BACK to $PREV_TAG ==="
              sed -i "s/^OOOEOEO_IMAGE_TAG=.*/OOOEOEO_IMAGE_TAG=$PREV_TAG/" .env
              docker compose pull cloud_v1 website web_console
              docker compose up -d --no-deps cloud_v1 website web_console
              echo "=== Rollback complete ==="
              exit 1
            fi

            echo "=== Deploy $VERSION succeeded ==="
