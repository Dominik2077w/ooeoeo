# 构建桌面端 runtime 二进制
# 产物：whisper-server + opus-mt-server + madlad-server + llama-server + mesh-worker
# 平台：Windows x64 (CPU/CUDA/Vulkan) + macOS Universal (Metal/CPU)
# 源码从 Myjoy 私有仓库 checkout，不泄漏
#
# mesh_worker_only=true 时仅重编 mesh-worker（~30秒），其余从现有 release 复用

name: Build Desktop Runtime

on:
  workflow_dispatch:
    inputs:
      whisper_cpp_ref:
        description: "whisper.cpp Git ref (tag or commit)"
        required: false
        default: "v1.8.4"
      llama_cpp_ref:
        description: "llama.cpp Git ref (tag or commit)"
        required: false
        default: "b8977"
      upload_release:
        description: "Upload artifacts to GitHub Release"
        required: false
        default: "true"
        type: boolean
      ref:
        description: "Myjoy Git ref"
        required: false
        default: "main"
      skip_whisper:
        description: "跳过 whisper 构建（whisper 从上次 release 复用，仅构建 mesh-worker + opus-mt-server + madlad-server + llama-server）"
        required: false
        default: "false"
        type: boolean
      skip_llama:
        description: "跳过 llama 构建（llama 从上次 release 复用）"
        required: false
        default: "false"
        type: boolean
      mesh_worker_only:
        description: "仅重编 mesh-worker（跳过 whisper + opus-mt + llama 构建）"
        required: false
        default: "false"
        type: boolean
  repository_dispatch:
    types: [build-runtime]

env:
  WHISPER_CPP_REF: ${{ github.event.inputs.whisper_cpp_ref || 'v1.8.4' }}
  LLAMA_CPP_REF: ${{ github.event.inputs.llama_cpp_ref || 'b8977' }}
  GO_VERSION: "1.25"
  PYTHON_VERSION: "3.11"
  MYJOY_REPO: Dominik2077w/Myjoy

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write

jobs:
  windows-whisper-cpu:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build (CPU)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF
          cmake --build whisper-cpp/build --config Release --target whisper-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path whisper-cpp/build -Include "whisper-server.exe","server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/whisper-server-cpu.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-whisper-cpu
          path: artifacts/whisper-server-cpu.exe

  windows-whisper-cuda:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.2"
          method: "network"
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build (CUDA)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_CUDA=ON
          cmake --build whisper-cpp/build --config Release --target whisper-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path whisper-cpp/build -Include "whisper-server.exe","server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/whisper-server-cuda.exe
          $cudaPath = $env:CUDA_PATH
          if ($cudaPath) {
            foreach ($p in @("cudart64_*.dll","cublas64_*.dll","cublasLt64_*.dll")) {
              Get-ChildItem -Path "$cudaPath/bin" -Filter $p -EA SilentlyContinue | ForEach-Object { Copy-Item $_.FullName artifacts/ }
            }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-whisper-cuda
          path: artifacts/

  windows-whisper-vulkan:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: windows-latest
    env:
      VULKAN_SDK_VERSION: "1.4.304.1"
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $installer = "$env:TEMP\VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_SDK_VERSION }}/windows/VulkanSDK-${{ env.VULKAN_SDK_VERSION }}-Installer.exe" -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build (Vulkan)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_VULKAN=ON
          cmake --build whisper-cpp/build --config Release --target whisper-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path whisper-cpp/build -Include "whisper-server.exe","server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/whisper-server-vulkan.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-whisper-vulkan
          path: artifacts/whisper-server-vulkan.exe

  # ── llama.cpp llama-server (Qwen 翻译模型 inference 后端) ──
  # 与 whisper-server 同级部署, 桌面端按 GPU 可用性选择 CPU/CUDA/Vulkan 变体。
  # 构建流程与 whisper 完全对称: cmake + MSBuild, 无需 patch。
  # llama.cpp 的 server target 是 llama-server (非 whisper-server)。

  windows-llama-cpu:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_llama != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Clone llama.cpp
        run: git clone --depth 1 --branch ${{ env.LLAMA_CPP_REF }} https://github.com/ggerganov/llama.cpp.git llama-cpp
      - name: Build (CPU)
        run: |
          cmake -S llama-cpp -B llama-cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DLLAMA_CURL=OFF
          cmake --build llama-cpp/build --config Release --target llama-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path llama-cpp/build -Include "llama-server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "llama-server-cpu.exe not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/llama-server-cpu.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-llama-cpu
          path: artifacts/llama-server-cpu.exe

  windows-llama-cuda:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_llama != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.2"
          method: "network"
      - name: Clone llama.cpp
        run: git clone --depth 1 --branch ${{ env.LLAMA_CPP_REF }} https://github.com/ggerganov/llama.cpp.git llama-cpp
      - name: Build (CUDA)
        run: |
          cmake -S llama-cpp -B llama-cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DLLAMA_CURL=OFF
          cmake --build llama-cpp/build --config Release --target llama-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path llama-cpp/build -Include "llama-server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "llama-server-cuda.exe not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/llama-server-cuda.exe
          # CUDA runtime DLLs — 与 whisper-cuda 共享同一版本。此处也导出一份,
          # package 步骤合并时同路径文件自然 dedup (最后一份覆盖,内容相同)。
          $cudaPath = $env:CUDA_PATH
          if ($cudaPath) {
            foreach ($p in @("cudart64_*.dll","cublas64_*.dll","cublasLt64_*.dll")) {
              Get-ChildItem -Path "$cudaPath/bin" -Filter $p -EA SilentlyContinue | ForEach-Object { Copy-Item $_.FullName artifacts/ }
            }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-llama-cuda
          path: artifacts/

  windows-llama-vulkan:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_llama != 'true'
    runs-on: windows-latest
    env:
      VULKAN_SDK_VERSION: "1.4.304.1"
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $installer = "$env:TEMP\VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_SDK_VERSION }}/windows/VulkanSDK-${{ env.VULKAN_SDK_VERSION }}-Installer.exe" -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH
      - name: Clone llama.cpp
        run: git clone --depth 1 --branch ${{ env.LLAMA_CPP_REF }} https://github.com/ggerganov/llama.cpp.git llama-cpp
      - name: Build (Vulkan)
        run: |
          cmake -S llama-cpp -B llama-cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON -DLLAMA_CURL=OFF
          cmake --build llama-cpp/build --config Release --target llama-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path llama-cpp/build -Include "llama-server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "llama-server-vulkan.exe not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/llama-server-vulkan.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-llama-vulkan
          path: artifacts/llama-server-vulkan.exe

  # ── qwen-translate-server (Qwen 翻译编排层) ──
  # PyInstaller 打包, 与 opus-mt-server / madlad-server 同级部署。
  # 源文件: ooeoeo/client/platform/qwen-translate-server/
  # TODO: 源文件 (qwen_translate_server.py, qwen_translate_server.spec, requirements.txt)
  #       尚未创建。创建后本 job 自动生效。
  windows-qwen-translate-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check source exists
        shell: bash
        run: |
          DIR="ooeoeo/client/platform/qwen-translate-server"
          if [ ! -f "$DIR/qwen_translate_server.py" ]; then
            echo "WARNING: qwen_translate_server.py 尚未创建, 跳过构建。"
            echo "        源文件就绪后本 job 自动生效, 无需修改 workflow。"
            echo "SKIP_QWEN=true" >> $GITHUB_ENV
          else
            echo "SKIP_QWEN=false" >> $GITHUB_ENV
          fi
      - name: Install deps
        if: env.SKIP_QWEN != 'true'
        run: pip install -r ooeoeo/client/platform/qwen-translate-server/requirements.txt
      - name: Build
        if: env.SKIP_QWEN != 'true'
        working-directory: ooeoeo/client/platform/qwen-translate-server
        run: pyinstaller qwen_translate_server.spec --noconfirm
      - uses: actions/upload-artifact@v4
        if: env.SKIP_QWEN != 'true'
        with:
          name: windows-qwen-translate-server
          path: ooeoeo/client/platform/qwen-translate-server/dist/qwen-translate-server.exe

  windows-opus-mt-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ooeoeo/client/platform/opus-mt-server/requirements.txt
      - name: Build
        working-directory: ooeoeo/client/platform/opus-mt-server
        run: pyinstaller opus_mt_server.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: windows-opus-mt-server
          path: ooeoeo/client/platform/opus-mt-server/dist/opus-mt-server.exe

  windows-madlad-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ooeoeo/client/platform/madlad-server/requirements.txt
      - name: Build
        working-directory: ooeoeo/client/platform/madlad-server
        run: pyinstaller madlad_server.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: windows-madlad-server
          path: ooeoeo/client/platform/madlad-server/dist/madlad-server.exe

  windows-mesh-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: cd meshcore && go build -trimpath -ldflags="-s -w" -o mesh-worker.exe ./cmd/mesh-worker/
      - uses: actions/upload-artifact@v4
        with:
          name: windows-mesh-worker
          path: meshcore/mesh-worker.exe

  macos-whisper:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build arm64 (Metal)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build-arm64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_METAL=ON
          cmake --build whisper-cpp/build-arm64 --config Release --target whisper-server -j $(sysctl -n hw.ncpu)
      - name: Build x86_64 (CPU)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build-x86_64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64 -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_METAL=OFF -DGGML_NATIVE=OFF
          cmake --build whisper-cpp/build-x86_64 --config Release --target whisper-server -j $(sysctl -n hw.ncpu)
      - name: Universal Binary
        run: |
          mkdir -p artifacts
          lipo -create whisper-cpp/build-arm64/bin/whisper-server whisper-cpp/build-x86_64/bin/whisper-server -output artifacts/whisper-server
          chmod +x artifacts/whisper-server
          metal_lib=$(find whisper-cpp/build-arm64 -name "*.metallib" -type f | head -1)
          if [ -n "$metal_lib" ]; then cp "$metal_lib" artifacts/; fi
      - uses: actions/upload-artifact@v4
        with:
          name: macos-whisper
          path: artifacts/

  macos-opus-mt-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ooeoeo/client/platform/opus-mt-server/requirements.txt
      - name: Build arm64
        working-directory: ooeoeo/client/platform/opus-mt-server
        run: |
          pyinstaller opus_mt_server.spec --noconfirm
          mv dist/opus-mt-server dist/opus-mt-server-arm64
      - name: Build x86_64 via Rosetta
        working-directory: ooeoeo/client/platform/opus-mt-server
        continue-on-error: true
        run: |
          arch -x86_64 /usr/bin/python3 -m pip install -r requirements.txt --target .x86deps
          PYTHONPATH=.x86deps arch -x86_64 /usr/bin/python3 -m PyInstaller opus_mt_server.spec --noconfirm --distpath dist-x86
          mv dist-x86/opus-mt-server dist/opus-mt-server-x86_64
      - name: Universal Binary
        run: |
          cd ooeoeo/client/platform/opus-mt-server/dist
          if [ -f opus-mt-server-x86_64 ]; then
            lipo -create opus-mt-server-arm64 opus-mt-server-x86_64 -output opus-mt-server
          else
            cp opus-mt-server-arm64 opus-mt-server
          fi
          chmod +x opus-mt-server
      - uses: actions/upload-artifact@v4
        with:
          name: macos-opus-mt-server
          path: ooeoeo/client/platform/opus-mt-server/dist/opus-mt-server

  macos-madlad-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ooeoeo/client/platform/madlad-server/requirements.txt
      - name: Build arm64
        working-directory: ooeoeo/client/platform/madlad-server
        run: |
          pyinstaller madlad_server.spec --noconfirm
          mv dist/madlad-server dist/madlad-server-arm64
      - name: Build x86_64 via Rosetta
        working-directory: ooeoeo/client/platform/madlad-server
        continue-on-error: true
        run: |
          arch -x86_64 /usr/bin/python3 -m pip install -r requirements.txt --target .x86deps
          PYTHONPATH=.x86deps arch -x86_64 /usr/bin/python3 -m PyInstaller madlad_server.spec --noconfirm --distpath dist-x86
          mv dist-x86/madlad-server dist/madlad-server-x86_64
      - name: Universal Binary
        run: |
          cd ooeoeo/client/platform/madlad-server/dist
          if [ -f madlad-server-x86_64 ]; then
            lipo -create madlad-server-arm64 madlad-server-x86_64 -output madlad-server
          else
            cp madlad-server-arm64 madlad-server
          fi
          chmod +x madlad-server
      - uses: actions/upload-artifact@v4
        with:
          name: macos-madlad-server
          path: ooeoeo/client/platform/madlad-server/dist/madlad-server

  macos-mesh-worker:
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build Universal
        run: |
          cd meshcore
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o mesh-worker-arm64 ./cmd/mesh-worker/
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o mesh-worker-x86_64 ./cmd/mesh-worker/
          lipo -create mesh-worker-arm64 mesh-worker-x86_64 -output mesh-worker
          rm mesh-worker-arm64 mesh-worker-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-mesh-worker
          path: meshcore/mesh-worker

  # ── Silero VAD 模型 ──
  # whisper.cpp 内置 silero VAD 支持; 模型与 whisper-server 同目录, mesh-worker
  # 启动 whisper-server 时如果发现 ggml-silero-v5.1.2.bin 存在就自动加 --vad 参数。
  # silero ggml 模型文件 ~2.2MB, 由 ggerganov/whisper.cpp HF 仓库托管。
  silero-vad-model:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download silero ggml model
        run: |
          mkdir -p artifacts
          # whisper.cpp 官方 silero 模型托管在 ggml-org/whisper-vad (大小 ~865KB)
          # 由 whisper.cpp/models/download-vad-model.sh 引用,与 v1.8.4 兼容
          curl -fsSL -o artifacts/ggml-silero-v5.1.2.bin \
            https://huggingface.co/ggml-org/whisper-vad/resolve/main/ggml-silero-v5.1.2.bin
          ls -la artifacts/ggml-silero-v5.1.2.bin
          # 简单 sanity check: 文件大小应该 > 100KB
          size=$(stat -c %s artifacts/ggml-silero-v5.1.2.bin 2>/dev/null || stat -f %z artifacts/ggml-silero-v5.1.2.bin)
          if [ "$size" -lt 100000 ]; then
            echo "ERROR: silero model too small ($size bytes), download failed"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: silero-vad-model
          path: artifacts/ggml-silero-v5.1.2.bin

  package:
    needs: [windows-whisper-cpu, windows-whisper-cuda, windows-whisper-vulkan, windows-opus-mt-server, windows-madlad-server, windows-mesh-worker, windows-llama-cpu, windows-llama-cuda, windows-llama-vulkan, windows-qwen-translate-server, macos-whisper, macos-opus-mt-server, macos-madlad-server, macos-mesh-worker, silero-vad-model]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MESH_WORKER_ONLY: ${{ github.event.inputs.mesh_worker_only }}
      SKIP_WHISPER: ${{ github.event.inputs.skip_whisper }}
      SKIP_LLAMA: ${{ github.event.inputs.skip_llama }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      # skip_whisper / skip_llama / mesh_worker_only 模式：从现有 release 下载对应二进制复用。
      #
      # 历史坑（2026-04-19,和 release.yml 同类）: 之前查 `/releases` endpoint 然后 jq 过滤
      # startswith("desktop/"), 但 /releases 默认 per_page=30, 每发一版 v1.x.x 都会把
      # desktop/runtime tag 往后挤。发到第 30+ 版时 desktop/runtime 掉出第一页,WIN_URL 变空,
      # 下面 if 被跳过, existing-win 目录是空的, 后面 cp 失败。
      # 现在改成直接按 tag 查 /releases/tags/desktop%2Fruntime（O(1),无分页问题）,
      # 且 URL 空时 fail-fast —— reuse 模式前提就是 existing release 可用,缺就没得 reuse。
      - name: Download existing runtime (reuse whisper/llama)
        if: env.MESH_WORKER_ONLY == 'true' || env.SKIP_WHISPER == 'true' || env.SKIP_LLAMA == 'true'
        run: |
          WIN_URL=$(gh api "repos/${{ github.repository }}/releases/tags/desktop%2Fruntime" \
            --jq '.assets[] | select(.name == "runtime-windows-x64.zip") | .browser_download_url' 2>/dev/null || echo "")
          if [ -z "$WIN_URL" ]; then
            echo "ERROR: desktop/runtime release 不存在或缺 runtime-windows-x64.zip, 无法 reuse whisper/llama。"
            echo "       先跑一次全量 Build Desktop Runtime（不勾 mesh_worker_only / skip_whisper / skip_llama）填充 desktop/runtime tag。"
            exit 1
          fi
          echo "下载现有 Windows runtime: $WIN_URL"
          curl -L -o /tmp/existing-win.zip "$WIN_URL"
          mkdir -p existing-win && cd existing-win && unzip /tmp/existing-win.zip && cd ..

          MAC_URL=$(gh api "repos/${{ github.repository }}/releases/tags/desktop%2Fruntime" \
            --jq '.assets[] | select(.name == "runtime-macos-universal.zip") | .browser_download_url' 2>/dev/null || echo "")
          if [ -z "$MAC_URL" ]; then
            echo "ERROR: desktop/runtime release 缺 runtime-macos-universal.zip, 无法 reuse。"
            exit 1
          fi
          echo "下载现有 macOS runtime: $MAC_URL"
          curl -L -o /tmp/existing-mac.zip "$MAC_URL"
          mkdir -p existing-mac && cd existing-mac && unzip /tmp/existing-mac.zip && cd ..

      - name: Package Windows runtime
        run: |
          mkdir -p windows-runtime
          REUSE_WHISPER="${MESH_WORKER_ONLY:-false}"
          [ "$SKIP_WHISPER" = "true" ] && REUSE_WHISPER="true"
          REUSE_LLAMA="${MESH_WORKER_ONLY:-false}"
          [ "$SKIP_LLAMA" = "true" ] && REUSE_LLAMA="true"

          # ─ whisper / silero VAD / CUDA DLLs ─
          if [ "$REUSE_WHISPER" = "true" ]; then
            # 从现有 release 复用 whisper + silero VAD + CUDA 运行库。
            # 历史坑：此处曾用 `cp ... 2>/dev/null || true` 静默吞错，
            # mesh_worker_only 从一个缺 whisper 的 existing release 复用时，
            # 默默产出不完整 zip，再通过 release delete+create 覆盖线上 tag，
            # 用户桌面端启动 whisper 报 "inference 未就绪 (Stopped)"。
            # 现在严格 cp，源文件缺一个立刻 fail。
            for f in whisper-server-cpu.exe whisper-server-cuda.exe whisper-server-vulkan.exe ggml-silero-v5.1.2.bin; do
              cp "existing-win/$f" windows-runtime/
            done
            # CUDA 运行库 DLL 带版本号需 glob 展开；每个 pattern 至少一个匹配
            for pattern in "cudart64_*.dll" "cublas64_*.dll" "cublasLt64_*.dll"; do
              if ! compgen -G "existing-win/$pattern" >/dev/null; then
                echo "ERROR: existing-win/ 缺 $pattern，无法复用 whisper-cuda。"
                ls -la existing-win/
                exit 1
              fi
              cp existing-win/$pattern windows-runtime/
            done
          else
            cp all-artifacts/windows-whisper-cpu/whisper-server-cpu.exe windows-runtime/
            cp all-artifacts/windows-whisper-cuda/* windows-runtime/
            cp all-artifacts/windows-whisper-vulkan/whisper-server-vulkan.exe windows-runtime/
            cp all-artifacts/silero-vad-model/ggml-silero-v5.1.2.bin windows-runtime/
          fi

          # ─ llama-server ─
          if [ "$REUSE_LLAMA" = "true" ]; then
            # 从现有 release 复用 llama-server 三变体。
            # 严格 cp：源文件缺一个立刻 fail。首次发版必须先跑全量 build。
            for f in llama-server-cpu.exe llama-server-cuda.exe llama-server-vulkan.exe; do
              cp "existing-win/$f" windows-runtime/
            done
          else
            cp all-artifacts/windows-llama-cpu/llama-server-cpu.exe windows-runtime/
            cp all-artifacts/windows-llama-cuda/* windows-runtime/ 2>/dev/null || true
            cp all-artifacts/windows-llama-vulkan/llama-server-vulkan.exe windows-runtime/
          fi

          # ─ opus-mt-server / madlad-server ─
          # 新构建或复用 (严格, 缺就 fail)
          # MADLAD 是本期新增,老的 runtime tag 不含 madlad-server.exe, reuse 会直接失败 ——
          # 这是故意的: mesh_worker_only 模式发版前必须先跑一次全量 build, 把 madlad 录进去。
          if [ "$MESH_WORKER_ONLY" = "true" ]; then
            cp existing-win/opus-mt-server.exe windows-runtime/
            cp existing-win/madlad-server.exe windows-runtime/
          else
            cp all-artifacts/windows-opus-mt-server/opus-mt-server.exe windows-runtime/
            cp all-artifacts/windows-madlad-server/madlad-server.exe windows-runtime/
          fi

          # ─ qwen-translate-server ─
          # 源文件尚未创建, 构建 job 自动跳过; 此处仅当 artifact 存在才复制。
          if [ -f "all-artifacts/windows-qwen-translate-server/qwen-translate-server.exe" ]; then
            cp all-artifacts/windows-qwen-translate-server/qwen-translate-server.exe windows-runtime/
          elif [ "$MESH_WORKER_ONLY" = "true" ] && [ -f "existing-win/qwen-translate-server.exe" ]; then
            cp existing-win/qwen-translate-server.exe windows-runtime/
          fi

          cp all-artifacts/windows-mesh-worker/mesh-worker.exe windows-runtime/

          # ── 产物 manifest 校验 ──
          # zip 前最后一道防线：显式断言所有必需文件到位，缺任何一个就终止
          # workflow，避免坏 zip 覆盖 desktop/runtime tag 上的好产物。
          required=(whisper-server-cpu.exe whisper-server-cuda.exe whisper-server-vulkan.exe opus-mt-server.exe madlad-server.exe mesh-worker.exe ggml-silero-v5.1.2.bin llama-server-cpu.exe llama-server-cuda.exe llama-server-vulkan.exe qwen-translate-server.exe)
          missing=()
          for f in "${required[@]}"; do
            [ -f "windows-runtime/$f" ] || missing+=("$f")
          done
          for pattern in "cudart64_*.dll" "cublas64_*.dll" "cublasLt64_*.dll"; do
            compgen -G "windows-runtime/$pattern" >/dev/null || missing+=("$pattern")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Windows runtime manifest 校验失败，缺少："
            printf '  - %s\n' "${missing[@]}"
            echo ""
            echo "windows-runtime/ 实际内容："
            ls -la windows-runtime/
            exit 1
          fi
          echo "Windows runtime manifest OK："
          ls -la windows-runtime/

          cd windows-runtime && zip -r ../runtime-windows-x64.zip .

      - name: Package macOS runtime
        run: |
          mkdir -p macos-runtime
          REUSE_WHISPER="${MESH_WORKER_ONLY:-false}"
          [ "$SKIP_WHISPER" = "true" ] && REUSE_WHISPER="true"

          if [ "$REUSE_WHISPER" = "true" ]; then
            # 历史坑同 Windows 端（见 Package Windows runtime 注释）：严格 cp 必需项。
            # whisper-server + silero VAD 必需；.metallib 是 Metal 着色器库，老 build
            # 可能没打进去，视为可选。
            for f in whisper-server ggml-silero-v5.1.2.bin; do
              cp "existing-mac/$f" macos-runtime/
            done
            for f in default.metallib ggml-metal.metallib; do
              if [ -f "existing-mac/$f" ]; then cp "existing-mac/$f" macos-runtime/; fi
            done
          else
            cp all-artifacts/macos-whisper/* macos-runtime/
            cp all-artifacts/silero-vad-model/ggml-silero-v5.1.2.bin macos-runtime/
          fi
          # opus-mt-server / madlad-server: 新构建或复用 (严格,缺就 fail)
          if [ "$MESH_WORKER_ONLY" = "true" ]; then
            cp existing-mac/opus-mt-server macos-runtime/
            cp existing-mac/madlad-server macos-runtime/
          else
            cp all-artifacts/macos-opus-mt-server/opus-mt-server macos-runtime/
            cp all-artifacts/macos-madlad-server/madlad-server macos-runtime/
          fi
          cp all-artifacts/macos-mesh-worker/mesh-worker macos-runtime/
          chmod +x macos-runtime/* 2>/dev/null || true

          # ── 产物 manifest 校验 ──
          required=(whisper-server opus-mt-server madlad-server mesh-worker ggml-silero-v5.1.2.bin)
          missing=()
          for f in "${required[@]}"; do
            [ -f "macos-runtime/$f" ] || missing+=("$f")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: macOS runtime manifest 校验失败，缺少："
            printf '  - %s\n' "${missing[@]}"
            echo ""
            echo "macos-runtime/ 实际内容："
            ls -la macos-runtime/
            exit 1
          fi
          echo "macOS runtime manifest OK："
          ls -la macos-runtime/

          cd macos-runtime && zip -r ../runtime-macos-universal.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-windows-x64
          path: runtime-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-macos-universal
          path: runtime-macos-universal.zip

  release:
    needs: [package]
    if: (github.event.inputs.upload_release == 'true' || github.event.client_payload.upload_release == true) && !cancelled() && needs.package.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.event.client_payload.tag || 'desktop/runtime' }}"
          # 删除已存在的同名 release（重新构建时覆盖）
          gh release delete "$TAG" --repo ${{ github.repository }} -y 2>/dev/null || true
          git push --delete origin "refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Desktop Runtime $TAG" \
            --notes "Runtime binaries (whisper-server, opus-mt-server, madlad-server, llama-server, mesh-worker) for desktop engine." \
            release-artifacts/runtime-windows-x64/runtime-windows-x64.zip \
            release-artifacts/runtime-macos-universal/runtime-macos-universal.zip
