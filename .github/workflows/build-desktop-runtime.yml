# 构建桌面端 runtime 二进制
# 产物：whisper-server + opus-mt-server + mesh-worker
# 平台：Windows x64 (CPU/CUDA/Vulkan) + macOS Universal (Metal/CPU)
# 源码从 Myjoy 私有仓库 checkout，不泄漏
#
# mesh_worker_only=true 时仅重编 mesh-worker（~30秒），其余从现有 release 复用

name: Build Desktop Runtime

on:
  workflow_dispatch:
    inputs:
      whisper_cpp_ref:
        description: "whisper.cpp Git ref (tag or commit)"
        required: false
        default: "v1.8.4"
      upload_release:
        description: "Upload artifacts to GitHub Release"
        required: false
        default: "true"
        type: boolean
      ref:
        description: "Myjoy Git ref"
        required: false
        default: "main"
      skip_whisper:
        description: "跳过 whisper 构建（whisper 从上次 release 复用，仅构建 mesh-worker + opus-mt-server）"
        required: false
        default: "false"
        type: boolean
      mesh_worker_only:
        description: "仅重编 mesh-worker（跳过 whisper + opus-mt 构建）"
        required: false
        default: "false"
        type: boolean
  repository_dispatch:
    types: [build-runtime]

env:
  WHISPER_CPP_REF: ${{ github.event.inputs.whisper_cpp_ref || 'v1.8.4' }}
  GO_VERSION: "1.25"
  PYTHON_VERSION: "3.11"
  MYJOY_REPO: Dominik2077w/Myjoy

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write

jobs:
  windows-whisper-cpu:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build (CPU)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF
          cmake --build whisper-cpp/build --config Release --target whisper-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path whisper-cpp/build -Include "whisper-server.exe","server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/whisper-server-cpu.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-whisper-cpu
          path: artifacts/whisper-server-cpu.exe

  windows-whisper-cuda:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.2"
          method: "network"
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build (CUDA)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_CUDA=ON
          cmake --build whisper-cpp/build --config Release --target whisper-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path whisper-cpp/build -Include "whisper-server.exe","server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/whisper-server-cuda.exe
          $cudaPath = $env:CUDA_PATH
          if ($cudaPath) {
            foreach ($p in @("cudart64_*.dll","cublas64_*.dll","cublasLt64_*.dll")) {
              Get-ChildItem -Path "$cudaPath/bin" -Filter $p -EA SilentlyContinue | ForEach-Object { Copy-Item $_.FullName artifacts/ }
            }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-whisper-cuda
          path: artifacts/

  windows-whisper-vulkan:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: windows-latest
    env:
      VULKAN_SDK_VERSION: "1.4.304.1"
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $installer = "$env:TEMP\VulkanSDK-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_SDK_VERSION }}/windows/VulkanSDK-${{ env.VULKAN_SDK_VERSION }}-Installer.exe" -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build (Vulkan)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_VULKAN=ON
          cmake --build whisper-cpp/build --config Release --target whisper-server -j $env:NUMBER_OF_PROCESSORS
      - name: Collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Recurse -Path whisper-cpp/build -Include "whisper-server.exe","server.exe" -File | Where-Object { $_.DirectoryName -notmatch 'CMakeFiles' } | Select-Object -First 1
          if (-not $exe) { Write-Error "not found"; exit 1 }
          Copy-Item $exe.FullName artifacts/whisper-server-vulkan.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-whisper-vulkan
          path: artifacts/whisper-server-vulkan.exe

  windows-opus-mt-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ooeoeo/client/platform/opus-mt-server/requirements.txt
      - name: Build
        working-directory: ooeoeo/client/platform/opus-mt-server
        run: pyinstaller opus_mt_server.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: windows-opus-mt-server
          path: ooeoeo/client/platform/opus-mt-server/dist/opus-mt-server.exe

  windows-mesh-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: cd meshcore && go build -trimpath -ldflags="-s -w" -o mesh-worker.exe ./cmd/mesh-worker/
      - uses: actions/upload-artifact@v4
        with:
          name: windows-mesh-worker
          path: meshcore/mesh-worker.exe

  macos-whisper:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - name: Clone whisper.cpp
        run: git clone --depth 1 --branch ${{ env.WHISPER_CPP_REF }} https://github.com/ggerganov/whisper.cpp.git whisper-cpp
      - name: Apply whisper-server abort patch
        shell: bash
        run: |
          cd whisper-cpp
          git apply ../ooeoeo/client/platform/runtime-patches/whisper-server-abort.patch
      - name: Build arm64 (Metal)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build-arm64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_METAL=ON
          cmake --build whisper-cpp/build-arm64 --config Release --target whisper-server -j $(sysctl -n hw.ncpu)
      - name: Build x86_64 (CPU)
        run: |
          cmake -S whisper-cpp -B whisper-cpp/build-x86_64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64 -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SERVER=ON -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF -DGGML_METAL=OFF -DGGML_NATIVE=OFF
          cmake --build whisper-cpp/build-x86_64 --config Release --target whisper-server -j $(sysctl -n hw.ncpu)
      - name: Universal Binary
        run: |
          mkdir -p artifacts
          lipo -create whisper-cpp/build-arm64/bin/whisper-server whisper-cpp/build-x86_64/bin/whisper-server -output artifacts/whisper-server
          chmod +x artifacts/whisper-server
          metal_lib=$(find whisper-cpp/build-arm64 -name "*.metallib" -type f | head -1)
          if [ -n "$metal_lib" ]; then cp "$metal_lib" artifacts/; fi
      - uses: actions/upload-artifact@v4
        with:
          name: macos-whisper
          path: artifacts/

  macos-opus-mt-server:
    if: github.event.inputs.mesh_worker_only != 'true'
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ooeoeo/client/platform/opus-mt-server/requirements.txt
      - name: Build arm64
        working-directory: ooeoeo/client/platform/opus-mt-server
        run: |
          pyinstaller opus_mt_server.spec --noconfirm
          mv dist/opus-mt-server dist/opus-mt-server-arm64
      - name: Build x86_64 via Rosetta
        working-directory: ooeoeo/client/platform/opus-mt-server
        continue-on-error: true
        run: |
          arch -x86_64 /usr/bin/python3 -m pip install -r requirements.txt --target .x86deps
          PYTHONPATH=.x86deps arch -x86_64 /usr/bin/python3 -m PyInstaller opus_mt_server.spec --noconfirm --distpath dist-x86
          mv dist-x86/opus-mt-server dist/opus-mt-server-x86_64
      - name: Universal Binary
        run: |
          cd ooeoeo/client/platform/opus-mt-server/dist
          if [ -f opus-mt-server-x86_64 ]; then
            lipo -create opus-mt-server-arm64 opus-mt-server-x86_64 -output opus-mt-server
          else
            cp opus-mt-server-arm64 opus-mt-server
          fi
          chmod +x opus-mt-server
      - uses: actions/upload-artifact@v4
        with:
          name: macos-opus-mt-server
          path: ooeoeo/client/platform/opus-mt-server/dist/opus-mt-server

  macos-mesh-worker:
    runs-on: macos-14
    steps:
      - name: Checkout Myjoy
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYJOY_REPO }}
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.MYJOY_PAT }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build Universal
        run: |
          cd meshcore
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o mesh-worker-arm64 ./cmd/mesh-worker/
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o mesh-worker-x86_64 ./cmd/mesh-worker/
          lipo -create mesh-worker-arm64 mesh-worker-x86_64 -output mesh-worker
          rm mesh-worker-arm64 mesh-worker-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-mesh-worker
          path: meshcore/mesh-worker

  # ── Silero VAD 模型 ──
  # whisper.cpp 内置 silero VAD 支持; 模型与 whisper-server 同目录, mesh-worker
  # 启动 whisper-server 时如果发现 ggml-silero-v5.1.2.bin 存在就自动加 --vad 参数。
  # silero ggml 模型文件 ~2.2MB, 由 ggerganov/whisper.cpp HF 仓库托管。
  silero-vad-model:
    if: github.event.inputs.mesh_worker_only != 'true' && github.event.inputs.skip_whisper != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download silero ggml model
        run: |
          mkdir -p artifacts
          # whisper.cpp 官方 silero 模型托管在 ggml-org/whisper-vad (大小 ~865KB)
          # 由 whisper.cpp/models/download-vad-model.sh 引用,与 v1.8.4 兼容
          curl -fsSL -o artifacts/ggml-silero-v5.1.2.bin \
            https://huggingface.co/ggml-org/whisper-vad/resolve/main/ggml-silero-v5.1.2.bin
          ls -la artifacts/ggml-silero-v5.1.2.bin
          # 简单 sanity check: 文件大小应该 > 100KB
          size=$(stat -c %s artifacts/ggml-silero-v5.1.2.bin 2>/dev/null || stat -f %z artifacts/ggml-silero-v5.1.2.bin)
          if [ "$size" -lt 100000 ]; then
            echo "ERROR: silero model too small ($size bytes), download failed"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: silero-vad-model
          path: artifacts/ggml-silero-v5.1.2.bin

  package:
    needs: [windows-whisper-cpu, windows-whisper-cuda, windows-whisper-vulkan, windows-opus-mt-server, windows-mesh-worker, macos-whisper, macos-opus-mt-server, macos-mesh-worker, silero-vad-model]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MESH_WORKER_ONLY: ${{ github.event.inputs.mesh_worker_only }}
      SKIP_WHISPER: ${{ github.event.inputs.skip_whisper }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      # skip_whisper / mesh_worker_only 模式：从现有 release 下载 whisper 二进制复用
      - name: Download existing runtime (reuse whisper)
        if: env.MESH_WORKER_ONLY == 'true' || env.SKIP_WHISPER == 'true'
        run: |
          # 下载现有 Windows runtime（取 whisper + silero VAD）
          WIN_URL=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.tag_name | startswith("desktop/"))] | .[0].assets[] | select(.name == "runtime-windows-x64.zip") | .browser_download_url' 2>/dev/null || echo "")
          if [ -n "$WIN_URL" ]; then
            echo "下载现有 Windows runtime..."
            curl -L -o /tmp/existing-win.zip "$WIN_URL"
            mkdir -p existing-win && cd existing-win && unzip /tmp/existing-win.zip && cd ..
          fi

          # 下载现有 macOS runtime
          MAC_URL=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.tag_name | startswith("desktop/"))] | .[0].assets[] | select(.name == "runtime-macos-universal.zip") | .browser_download_url' 2>/dev/null || echo "")
          if [ -n "$MAC_URL" ]; then
            echo "下载现有 macOS runtime..."
            curl -L -o /tmp/existing-mac.zip "$MAC_URL"
            mkdir -p existing-mac && cd existing-mac && unzip /tmp/existing-mac.zip && cd ..
          fi

      - name: Package Windows runtime
        run: |
          mkdir -p windows-runtime
          REUSE_WHISPER="${MESH_WORKER_ONLY:-false}"
          [ "$SKIP_WHISPER" = "true" ] && REUSE_WHISPER="true"

          if [ "$REUSE_WHISPER" = "true" ]; then
            # 从现有 release 复用 whisper + silero VAD
            for f in whisper-server-cpu.exe whisper-server-cuda.exe whisper-server-vulkan.exe ggml-silero-v5.1.2.bin cudart64_*.dll cublas64_*.dll cublasLt64_*.dll; do
              cp existing-win/$f windows-runtime/ 2>/dev/null || true
            done
          else
            cp all-artifacts/windows-whisper-cpu/whisper-server-cpu.exe windows-runtime/
            cp all-artifacts/windows-whisper-cuda/* windows-runtime/
            cp all-artifacts/windows-whisper-vulkan/whisper-server-vulkan.exe windows-runtime/
            [ -f all-artifacts/silero-vad-model/ggml-silero-v5.1.2.bin ] && cp all-artifacts/silero-vad-model/ggml-silero-v5.1.2.bin windows-runtime/
          fi
          # opus-mt-server: 新构建或复用
          if [ "$MESH_WORKER_ONLY" = "true" ]; then
            cp existing-win/opus-mt-server.exe windows-runtime/ 2>/dev/null || true
          else
            cp all-artifacts/windows-opus-mt-server/opus-mt-server.exe windows-runtime/ 2>/dev/null || true
          fi
          cp all-artifacts/windows-mesh-worker/mesh-worker.exe windows-runtime/
          cd windows-runtime && zip -r ../runtime-windows-x64.zip .

      - name: Package macOS runtime
        run: |
          mkdir -p macos-runtime
          REUSE_WHISPER="${MESH_WORKER_ONLY:-false}"
          [ "$SKIP_WHISPER" = "true" ] && REUSE_WHISPER="true"

          if [ "$REUSE_WHISPER" = "true" ]; then
            for f in whisper-server ggml-silero-v5.1.2.bin default.metallib ggml-metal.metallib; do
              cp existing-mac/$f macos-runtime/ 2>/dev/null || true
            done
          else
            cp all-artifacts/macos-whisper/* macos-runtime/
            [ -f all-artifacts/silero-vad-model/ggml-silero-v5.1.2.bin ] && cp all-artifacts/silero-vad-model/ggml-silero-v5.1.2.bin macos-runtime/
          fi
          # opus-mt-server: 新构建或复用
          if [ "$MESH_WORKER_ONLY" = "true" ]; then
            cp existing-mac/opus-mt-server macos-runtime/ 2>/dev/null || true
          else
            cp all-artifacts/macos-opus-mt-server/opus-mt-server macos-runtime/ 2>/dev/null || true
          fi
          cp all-artifacts/macos-mesh-worker/mesh-worker macos-runtime/
          chmod +x macos-runtime/* 2>/dev/null || true
          cd macos-runtime && zip -r ../runtime-macos-universal.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-windows-x64
          path: runtime-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-macos-universal
          path: runtime-macos-universal.zip

  release:
    needs: [package]
    if: (github.event.inputs.upload_release == 'true' || github.event.client_payload.upload_release == true) && !cancelled() && needs.package.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.event.client_payload.tag || 'desktop/runtime' }}"
          # 删除已存在的同名 release（重新构建时覆盖）
          gh release delete "$TAG" --repo ${{ github.repository }} -y 2>/dev/null || true
          git push --delete origin "refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Desktop Runtime $TAG" \
            --notes "Runtime binaries (whisper-server, opus-mt-server, mesh-worker) for desktop engine." \
            release-artifacts/runtime-windows-x64/runtime-windows-x64.zip \
            release-artifacts/runtime-macos-universal/runtime-macos-universal.zip
